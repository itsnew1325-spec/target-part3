            font-weight: bold;

let currentIdx = 0; 
let weakWords = JSON.parse(localStorage.getItem('weakWords_S16_19') || '[]');
let isShuffle = false;
let scrollInterval = null;
let currentSpeed = 0.0;

const tabsContainer = document.getElementById('tabs');
sections.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn';
    btn.innerText = s.name;
    btn.onclick = () => { currentIdx = i; updateView(); };
    tabsContainer.appendChild(btn);
});

window.onscroll = function() { updateProgressBar(); };

function updateProgressBar() {
    const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
    const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
    const scrolled = (winScroll / height) * 100;
    document.getElementById("progress-bar").style.width = (height <= 0 ? 0 : scrolled) + "%";
}

function setShuffle(val) {
    isShuffle = val;
    document.getElementById('shuffle-on').classList.toggle('active', isShuffle);
    document.getElementById('shuffle-off').classList.toggle('active', !isShuffle);
    updateView();
}

function updateView() {
    const title = document.getElementById('view-title');
    const list = document.getElementById('word-list');
    const btns = document.querySelectorAll('.tab-btn');
    
    btns.forEach((b, i) => {
        if (i === 0) return; 
        b.classList.toggle('active', currentIdx === i - 1);
    });
    document.getElementById('btn-weak').classList.toggle('active', currentIdx === -1);
    
    list.innerHTML = '';
    let targetWords = (currentIdx === -1) ? [...weakWords] : [...sections[currentIdx].words];
    title.innerText = (currentIdx === -1) ? "🔥 苦手な単語" : sections[currentIdx].full;

    if (targetWords.length === 0) {
        list.innerHTML = '<tr><td colspan="3" style="text-align:center; padding:100px;">データがありません。</td></tr>';
        document.getElementById("progress-bar").style.width = "0%";
        return;
    }

    if (isShuffle) {
        for (let i = targetWords.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [targetWords[i], targetWords[j]] = [targetWords[j], targetWords[i]];
        }
    }

    targetWords.forEach((w) => {
        const tr = document.createElement('tr');
        const isW = weakWords.some(x => x.w === w.w);
        tr.innerHTML = `
            <td><span class="fav-star ${isW ? 'active' : ''}" onclick="toggleWeak('${w.w}', '${w.a}', '${w.n}', this)">★</span></td>
            <td class="word-eng" onclick="speak('${w.w}')">
                <span class="word-no">${w.n}.</span>${w.w}
            </td>
            <td><span class="word-jp">${w.a}</span></td>
        `;
        list.appendChild(tr);
    });
    stopScroll();
    window.scrollTo(0, 0);
    setTimeout(updateProgressBar, 100);
}

function toggleWeak(w, a, n, el) {
    const idx = weakWords.findIndex(x => x.w === w);
    if (idx > -1) { weakWords.splice(idx, 1); el.classList.remove('active'); }
    else { weakWords.push({w, a, n}); el.classList.add('active'); }
    localStorage.setItem('weakWords_S16_19', JSON.stringify(weakWords));
    if (currentIdx === -1) updateView();
}

function showWeak() { currentIdx = -1; updateView(); }

function adjustSpeed(delta) {
    currentSpeed = Math.max(0, currentSpeed + delta);
    updateSpeedUI();
    startScrolling();
}

function toggleStop() {
    currentSpeed = 0;
    updateSpeedUI();
    clearInterval(scrollInterval);
}

function updateSpeedUI() {
    document.getElementById('speed-val').innerText = `速度: ${currentSpeed.toFixed(1)}`;
    document.getElementById('stop-btn').classList.toggle('active', currentSpeed === 0);
}

function startScrolling() {
    clearInterval(scrollInterval);
    if (currentSpeed <= 0) return;
    scrollInterval = setInterval(() => { window.scrollBy(0, 1); }, 50 / currentSpeed);
}

function stopScroll() {
    currentSpeed = 0;
    updateSpeedUI();
    clearInterval(scrollInterval);
}

function speak(t) {
    const u = new SpeechSynthesisUtterance(t);
    u.lang = 'en-US';
    speechSynthesis.speak(u);
}

const sheet = document.getElementById('red-sheet');
let isDragging = false, offset = {x:0, y:0};

function loadSheetPosition() {
    const savedPos = localStorage.getItem('redSheetPos_S16_19');
    if (savedPos) {
        const { top, left } = JSON.parse(savedPos);
        sheet.style.top = top;
        sheet.style.left = left;
        sheet.style.transform = 'none';
    }
}

const moveStart = (e) => {
    isDragging = true;
    const p = e.touches ? e.touches[0] : e;
    const r = sheet.getBoundingClientRect();
    offset.x = p.clientX - r.left;
    offset.y = p.clientY - r.top;
    sheet.style.transform = 'none';
};

const move = (e) => {
    if (!isDragging) return;
    const p = e.touches ? e.touches[0] : e;
    sheet.style.top = (p.clientY - offset.y) + 'px';
    sheet.style.left = (p.clientX - offset.x) + 'px';
};

const moveEnd = () => {
    if (isDragging) {
        isDragging = false;
        localStorage.setItem('redSheetPos_S16_19', JSON.stringify({
            top: sheet.style.top,
            left: sheet.style.left
        }));
    }
};

sheet.addEventListener('mousedown', moveStart);
sheet.addEventListener('touchstart', moveStart, {passive: false});
window.addEventListener('mousemove', move);
window.addEventListener('touchmove', (e) => {
    if (isDragging) e.preventDefault();
    move(e);
}, {passive: false});
window.addEventListener('mouseup', moveEnd);
window.addEventListener('touchend', moveEnd);

loadSheetPosition();
updateView();
</script>
